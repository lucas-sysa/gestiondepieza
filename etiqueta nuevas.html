<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generador 80x48mm</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

  <style>
    body { font-family: "Segoe UI", Arial, sans-serif; background-color: #f0f2f5; padding: 20px; }
    .container { max-width: 800px; margin: auto; padding: 25px; background: #fff; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
    input, select, button { margin: 8px; padding: 12px; border-radius: 6px; border: 1px solid #ddd; }
    button { background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
    button:hover { background-color: #0056b3; }
    
    #etiquetas-container { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-top: 25px; }
    
    /* 📏 ETIQUETA 80mm x 48mm */
    .etiqueta { 
      width: 80mm; height: 48mm; border: 1px solid #eee; padding: 3mm; 
      display: flex; flex-direction: column; justify-content: space-between; 
      align-items: center; background: white; box-sizing: border-box; overflow: hidden;
    }

    .codigo-texto { font-size: 20px; font-weight: bold; color: #000; margin: 0; }
    .descripcion-texto { font-size: 13px; color: #333; margin: 0; text-transform: uppercase; font-weight: 600; }
    
    /* El SVG debe tener dimensiones claras para que JsBarcode lo rellene */
    .barcode-svg { width: 90%; height: 22mm; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="container">
  <h2>Generador de Etiquetas (80x48mm)</h2>
  <input type="file" id="file-input" accept=".xlsx,.xls" />
  <br>
  <input type="text" id="buscador" placeholder="🔍 Buscar por código o descripción..." style="width: 70%;">
  <br>
  <select id="etiqueta-select"><option value="">-- Carga un archivo Excel --</option></select>
  <button onclick="imprimirSeleccionada()">🖨️ Imprimir Seleccionada</button>
</div>

<div id="etiquetas-container"></div>

<script>
let etiquetasDatos = [];

document.getElementById('file-input').addEventListener('change', function (e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function (event) {
    try {
      const data = new Uint8Array(event.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });

      etiquetasDatos = jsonData.map((item, index) => ({ 
        ...item, 
        id: "etq-" + index, // ID único alfanumérico
        CODIGO: item.CODIGO ? item.CODIGO.toString() : "0000"
      }));

      renderizarTodo(etiquetasDatos);
    } catch (err) {
      alert("Error al leer el archivo. Asegúrate de que sea un Excel válido.");
    }
  };
  reader.readAsArrayBuffer(file);
});

// Buscador
document.getElementById('buscador').addEventListener('input', function () {
  const termino = this.value.toLowerCase();
  const filtrados = etiquetasDatos.filter(item => 
    item.CODIGO.toLowerCase().includes(termino) || 
    (item.DESCRIPCION || "").toLowerCase().includes(termino)
  );
  renderizarTodo(filtrados);
});

function renderizarTodo(datos) {
  const contenedor = document.getElementById("etiquetas-container");
  const select = document.getElementById("etiqueta-select");
  
  contenedor.innerHTML = "";
  select.innerHTML = '<option value="">--Selecciona un código--</option>';

  datos.forEach((item) => {
    // Select
    const option = document.createElement("option");
    option.value = item.id;
    option.textContent = `${item.CODIGO} - ${item.DESCRIPCION}`;
    select.appendChild(option);

    // Etiqueta HTML
    const div = document.createElement("div");
    div.className = "etiqueta";
    div.id = `real-${item.id}`;
    div.innerHTML = `
      <div class="codigo-texto">${item.CODIGO}</div>
      <svg class="barcode-svg" id="svg-${item.id}"></svg>
      <div class="descripcion-texto">${item.DESCRIPCION || ""}</div>
    `;
    contenedor.appendChild(div);

    // Generar Barcode con un pequeño delay para asegurar que el SVG existe en el DOM
    setTimeout(() => {
      JsBarcode(`#svg-${item.id}`, item.CODIGO, {
        format: "CODE128",
        displayValue: false,
        height: 60,
        width: 2,
        margin: 0
      });
    }, 10);
  });
}

function imprimirSeleccionada() {
  const idVal = document.getElementById("etiqueta-select").value;
  if (!idVal) return alert("Por favor, selecciona una etiqueta primero.");

  const elemento = document.getElementById(`real-${idVal}`);
  if (!elemento) return;

  const printWindow = window.open('', '_blank');
  
  // Clonamos el contenido para pasarlo a la ventana de impresión
  const contenido = elemento.innerHTML;

  printWindow.document.write(`
    <html>
      <head>
        <title>Impresión de Etiqueta</title>
        <style>
          @page { size: 80mm 48mm; margin: 0; }
          body { 
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; 
            height: 48mm; width: 80mm; font-family: sans-serif;
          }
          .etiqueta { 
            width: 80mm; height: 48mm; 
            display: flex; flex-direction: column; 
            justify-content: space-between; align-items: center; 
            text-align: center; padding: 4mm; box-sizing: border-box;
          }
          .codigo-texto { font-size: 24px; font-weight: bold; }
          .descripcion-texto { font-size: 14px; font-weight: bold; text-transform: uppercase; }
          svg { width: 95%; max-height: 22mm; }
        </style>
      </head>
      <body>
        <div class="etiqueta">${contenido}</div>
      </body>
    </html>
  `);

  printWindow.document.close();

  // Esperar a que los gráficos se procesen en la nueva ventana antes de imprimir
  setTimeout(() => {
    printWindow.focus();
    printWindow.print();
    printWindow.close();
  }, 500);
}
</script>

</body>
</html>
