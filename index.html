<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestión de Piezas v2</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      margin: 0; padding: 20px;
    }
    .form-container {
      background: #fff;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      width: 100%; max-width: 450px;
    }
    .form-container h2 { text-align: center; margin-bottom: 20px; color: #333; }
    input, select {
      width: 100%; padding: 10px; margin-bottom: 12px;
      border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box;
    }
    .grid-ubicacion { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    button {
      width: 100%; background: #74ebd5; border: none; color: #333;
      font-weight: bold; padding: 12px; border-radius: 10px;
      font-size: 16px; cursor: pointer; transition: background 0.3s; margin-top: 10px;
    }
    button:hover { background: #62d3c0; }
    .readonly-bg { background-color: #f9f9f9; }
    p { margin: 5px 0; font-size: 0.9em; color: #666; font-weight: bold; }
  </style>
</head>
<body>

  <div class="form-container">
    <h2>Gestión de Piezas</h2>
    <form id="form">
      <input placeholder="Escanear tarjeta del operador" id="usuario" required autofocus />
      <input placeholder="Código de pieza" id="codigo" required />
      <input placeholder="Descripción" id="descripcion" class="readonly-bg" readonly />

      <div class="grid-ubicacion">
        <input type="number" placeholder="Entrada stock" id="entrada" />
        <input type="number" placeholder="Salida stock" id="salida" />
      </div>

      <p>Ubicación Geográfica:</p>
      <div class="grid-ubicacion">
        <input placeholder="Calle" id="calle" required />
        <input placeholder="Estantería" id="rack" required />
        <input placeholder="Fila" id="fila" required />
        <input placeholder="Posición" id="posicion" required />
      </div>

      <p>Destino y Estado:</p>
      <select id="box" required>
        <option value="">Seleccionar línea</option>
        <option value="Pañol-GDP">Pañol-GDP</option>
      </select>

      <select id="calidad" required>
        <option value="">Seleccionar Calidad</option>
        <option value="OK">OK</option>
        <option value="Scrap">Scrap</option>
        <option value="reparaciones-pintura">Reparaciones-Pintura</option>
      </select>

      <select id="observaciones">
        <option value="">Seleccionar observación</option>
        <option>ok</option>
        <option>Scrap</option>
        <option>Venta Especial</option>
        <option>Faltante de origen</option>
        <option>Faltante en fábrica</option>
        <option>Dañado de origen</option>
        <option>Dañado en fábrica</option>
        <option>Dañado en línea</option>
        <option>Defectuoso de origen</option>
        <option>L21</option>
        <option>L14</option>
        <option>L12</option>
        <option>L09</option>
        <option>L06</option>
        <option>Reparaciones</option>
        <option>Pintura</option>
      </select>

      <button type="submit" id="btnEnviar">Enviar Datos</button>
    </form>
  </div>

    };
    document.getElementById('codigo').addEventListener('input', function () {
      const codigoIngresado = this.value.trim().toUpperCase();
      document.getElementById('descripcion').value = productos[codigoIngresado] || '';
    });

    document.getElementById('form').addEventListener('submit', e => {
      e.preventDefault();
      const btn = document.getElementById('btnEnviar');
      
      let salidaFinal = "0";
      if (salidaInput.value) {
        salidaFinal = `-${Math.abs(parseInt(salidaInput.value))}`;
        if (!confirm(`¿Confirmas la salida de ${salidaFinal} unidades?`)) return;
      }

      btn.disabled = true;
      btn.innerText = "Enviando...";

      const data = {
        tipoReporte: "GDP",
        usuario: document.getElementById('usuario').value,
        codigo: document.getElementById('codigo').value,
        descripcion: document.getElementById('descripcion').value,
        entrada: entradaInput.value || "0",
        salida: salidaFinal,
        calle: document.getElementById('calle').value,
        estanteria: document.getElementById('rack').value,
        fila: document.getElementById('fila').value,
        posicion: document.getElementById('posicion').value,
        linea: document.getElementById('box').value,
        observaciones: document.getElementById('observaciones').value,
        calidad: document.getElementById('calidad').value
      };

      fetch(scriptURL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      })
      .then(() => {
        alert('Registro exitoso');
        document.getElementById('form').reset();
        entradaInput.disabled = false;
        salidaInput.disabled = false;
      })
      .catch(error => alert('Error: ' + error.message))
      .finally(() => {
        btn.disabled = false;
        btn.innerText = "Enviar Datos";
      });
    });
  </script>
