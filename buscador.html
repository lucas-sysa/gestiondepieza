<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stock Detallado - La Emilia</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --primary-color: #04847c;
      --accent-color: #355fb4;
      --bg-light: #f3f4f7;
      --bg-white: #ffffff;
      --border-radius: 12px;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-light);
      margin: 0;
      padding-top: 70px;
    }

    .menu-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      background-color: var(--primary-color);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 30px;
      z-index: 1000;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .container {
      background-color: var(--bg-white);
      max-width: 1300px;
      margin: 30px auto;
      padding: 30px;
      border-radius: var(--border-radius);
    }

    #dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }

    .dash-card {
      background: #f8f9fa;
      border-bottom: 4px solid var(--primary-color);
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }

    .dash-card span { display: block; font-size: 1.6rem; font-weight: bold; color: var(--accent-color); }

    .search-box {
      width: 100%;
      padding: 15px;
      border: 2px solid #eee;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 1rem;
      box-sizing: border-box;
    }

    table { width: 100%; border-collapse: collapse; }
    th { background: #f1f1f1; color: var(--primary-color); padding: 12px; text-align: left; border-bottom: 2px solid #ddd; }
    td { padding: 12px; border-bottom: 1px solid #eee; }

    .badge-loc {
      background: #eef2f1;
      color: #04847c;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="menu-bar">
    <div style="font-size: 1.2rem; font-weight: bold;">LA EMILIA - STOCK REAL</div>
    <button onclick="window.print()" style="padding: 8px 15px; cursor: pointer;">Imprimir</button>
  </div>

  <div class="container">
    <h2>Control de Inventario por Ubicación</h2>

    <div style="background: #f0f7f6; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed #04847c;">
      <label><strong>Paso 1: Cargue su archivo Excel</strong></label><br><br>
      <input type="file" id="fileInput" accept=".xlsx,.xls" />
    </div>

    <div id="dashboard">
      <div class="dash-card"><strong>Items</strong><span id="totalItems">0</span></div>
      <div class="dash-card"><strong>Stock Total</strong><span id="totalStock">0</span></div>
      <div class="dash-card"><strong>Ubicaciones</strong><span id="countLoc">0</span></div>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="Buscar..." oninput="buscar()">

    <table id="resultTable">
      <thead>
        <tr>
          <th>Código</th>
          <th>Descripción</th>
          <th>Calle</th>
          <th>Estantería</th>
          <th>Fila</th>
          <th>Posición</th>
          <th>Stock Actual</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="7" style="text-align:center; padding:50px; color: #999;">Esperando archivo...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    let datosOriginales = [];

    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        const data = e.target.result;
        const workbook = XLSX.read(data, { type: 'binary' });
        const sheetName = workbook.SheetNames.find(n => n.includes('GDPBD')) || workbook.SheetNames[0];
        const json = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);
        procesar(json);
      };
      reader.readAsBinaryString(file);
    });

    // REPARADOR DE TEXTO (Mantiene el resto de la información)
    function corregirTexto(texto) {
      if (!texto) return "-";
      let t = texto.toString().trim();
      
      // Reemplaza los símbolos rotos específicamente por la letra con tilde
      // pero conserva lo que haya antes y después.
      t = t.replace(/Estanter.a/gi, "Estantería");
      t = t.replace(/Posici.n/gi, "Posición");
      
      // Caso genérico para cualquier rombo con ? que haya quedado
      return t.replace(/\ufffd/g, "ó");
    }

    function getVal(fila, nombreCol) {
      const norm = s => s.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
      const buscado = norm(nombreCol);
      for (let key in fila) {
        if (norm(key) === buscado) return fila[key];
      }
      return "";
    }

    function procesar(data) {
      const consolidado = {};

      data.forEach(fila => {
        const cod = getVal(fila, 'Código') || getVal(fila, 'Codigo');
        if (!cod) return;

        // Extraer valores y aplicar corrección
        const calle = corregirTexto(getVal(fila, 'Calle'));
        const est = corregirTexto(getVal(fila, 'Estantería') || getVal(fila, 'Estanteria'));
        const niv = getVal(fila, 'Fila') || "-";
        const pos = corregirTexto(getVal(fila, 'Posición') || getVal(fila, 'Posicion'));
        const desc = getVal(fila, 'Descripción') || getVal(fila, 'Descripcion');

        const ent = parseFloat(getVal(fila, 'Entrada de Stock')) || 0;
        const sal = parseFloat(getVal(fila, 'Salida de Stock')) || 0;

        const llave = `${cod}|${calle}|${est}|${niv}|${pos}`;

        if (!consolidado[llave]) {
          consolidatedLlave = {
            codigo: cod,
            desc: desc,
            calle, est, niv, pos,
            stock: 0
          };
          consolidado[llave] = consolidatedLlave;
        }
        consolidado[llave].stock += (ent + sal);
      });

      datosOriginales = Object.values(consolidado).filter(i => Math.abs(i.stock) > 0);
      render(datosOriginales);
    }

    function render(lista) {
      const tbody = document.querySelector('#resultTable tbody');
      tbody.innerHTML = '';
      let totalS = 0;
      
      lista.forEach(i => {
        totalS += i.stock;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><strong>${i.codigo}</strong></td>
          <td>${i.desc}</td>
          <td><span class="badge-loc">${i.calle}</span></td>
          <td><span class="badge-loc">${i.est}</span></td>
          <td>${i.niv}</td>
          <td>${i.pos}</td>
          <td style="font-weight:bold; color:#04847c; font-size:1.1rem">${i.stock}</td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById('totalItems').textContent = lista.length;
      document.getElementById('totalStock').textContent = Math.round(totalS);
      document.getElementById('countLoc').textContent = new Set(lista.map(x => x.calle + x.est)).size;
    }

    function buscar() {
      const term = document.getElementById('searchInput').value.toLowerCase();
      const f = datosOriginales.filter(i => 
        i.codigo.toString().toLowerCase().includes(term) || 
        i.desc.toLowerCase().includes(term) ||
        i.calle.toLowerCase().includes(term) ||
        i.est.toLowerCase().includes(term) ||
        i.pos.toLowerCase().includes(term)
      );
      render(f);
    }
  </script>
</body>
</html>
