<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stock Detallado - La Emilia</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --primary-color: #04847c;
      --accent-color: #355fb4;
      --bg-light: #f3f4f7;
      --bg-white: #ffffff;
      --text-color: #333;
      --border-radius: 12px;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-light);
      margin: 0;
      padding-top: 70px;
    }

    .menu-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      background-color: var(--primary-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 30px;
      z-index: 1000;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .container {
      background-color: var(--bg-white);
      max-width: 1300px;
      margin: 30px auto;
      padding: 30px;
      border-radius: var(--border-radius);
    }

    #dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }

    .dash-card {
      background: #f8f9fa;
      border-bottom: 4px solid var(--primary-color);
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }

    .dash-card span { display: block; font-size: 1.5rem; font-weight: bold; color: var(--accent-color); }

    .search-box {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { background: #f1f1f1; color: var(--primary-color); padding: 12px; text-align: left; border-bottom: 2px solid #ddd; }
    td { padding: 10px; border-bottom: 1px solid #eee; }
    tr:hover { background-color: #f9f9f9; }

    .badge-loc {
      background: #eef2f1;
      color: #04847c;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
    }

    @media print {
      .menu-bar, input, .dash-card, canvas { display: none; }
      .container { width: 100%; max-width: 100%; box-shadow: none; }
    }
  </style>
</head>
<body>

  <div class="menu-bar">
    <div style="color:white; font-weight:bold;">LA EMILIA - SISTEMA DE RACKS</div>
    <button onclick="window.print()" style="cursor:pointer; padding:5px 15px;">Imprimir</button>
  </div>

  <div class="container">
    <h2>Control de Inventario por Ubicación</h2>

    <input type="file" id="fileInput" accept=".xlsx,.xls" style="margin-bottom: 20px;"/>

    <div id="dashboard">
      <div class="dash-card"><strong>Items</strong><span id="totalItems">0</span></div>
      <div class="dash-card"><strong>Stock Total</strong><span id="totalStock">0</span></div>
      <div class="dash-card"><strong>Calles</strong><span id="countCalles">0</span></div>
      <div class="dash-card"><strong>Estanterías</strong><span id="countRacks">0</span></div>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="Filtrar por código, descripción o calle..." oninput="buscar()">

    <table id="resultTable">
      <thead>
        <tr>
          <th>Código</th>
          <th>Descripción</th>
          <th>Calle</th>
          <th>Estantería</th>
          <th>Fila</th>
          <th>Posición</th>
          <th>Stock</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="7" style="text-align:center; padding:30px;">Cargue el archivo para ver el desglose</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    let datosOriginales = [];

    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        // Intentamos leer la hoja 'GDPBD' o la primera disponible
        const sheet = workbook.Sheets['GDPBD'] || workbook.Sheets[workbook.SheetNames[0]];
        procesar(XLSX.utils.sheet_to_json(sheet));
      };
      reader.readAsArrayBuffer(file);
    });

    function getVal(obj, key) {
      const norm = k => k.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
      const target = norm(key);
      for (let k in obj) { if (norm(k) === target) return obj[k]; }
      return "";
    }

    function procesar(data) {
      const map = {};

      data.forEach(row => {
        const cod = getVal(row, 'Código') || getVal(row, 'Codigo');
        if (!cod) return;

        const calle = getVal(row, 'Calle') || '-';
        const est = getVal(row, 'Estantería') || getVal(row, 'Estanteria') || '-';
        const fila = getVal(row, 'Fila') || '-';
        const pos = getVal(row, 'Posición') || getVal(row, 'Posicion') || '-';
        
        const ent = parseFloat(getVal(row, 'Entrada de Stock')) || 0;
        const sal = parseFloat(getVal(row, 'Salida de Stock')) || 0;

        // La clave única ahora considera cada parte de la ubicación
        const key = `${cod}|${calle}|${est}|${fila}|${pos}`;

        if (!map[key]) {
          map[key] = {
            codigo: cod,
            desc: getVal(row, 'Descripción') || getVal(row, 'Descripcion'),
            calle, est, fila, pos,
            stock: 0
          };
        }
        map[key].stock += (ent - sal);
      });

      datosOriginales = Object.values(map).filter(i => i.stock !== 0);
      render(datosOriginales);
    }

    function render(lista) {
      const tbody = document.querySelector('#resultTable tbody');
      tbody.innerHTML = '';
      
      let totalS = 0, calles = new Set(), racks = new Set();

      lista.forEach(i => {
        totalS += i.stock;
        if(i.calle !== '-') calles.add(i.calle);
        if(i.est !== '-') racks.add(i.est);

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><strong>${i.codigo}</strong></td>
          <td>${i.desc}</td>
          <td><span class="badge-loc">${i.calle}</span></td>
          <td><span class="badge-loc">${i.est}</span></td>
          <td>${i.fila}</td>
          <td>${i.pos}</td>
          <td style="font-weight:bold; color:var(--primary-color)">${i.stock}</td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById('totalItems').textContent = lista.length;
      document.getElementById('totalStock').textContent = Math.round(totalS);
      document.getElementById('countCalles').textContent = calles.size;
      document.getElementById('countRacks').textContent = racks.size;
    }

    function buscar() {
      const t = document.getElementById('searchInput').value.toLowerCase();
      const f = datosOriginales.filter(i => 
        i.codigo.toString().toLowerCase().includes(t) || 
        i.desc.toLowerCase().includes(t) ||
        i.calle.toLowerCase().includes(t)
      );
      render(f);
    }
  </script>
</body>
</html>
