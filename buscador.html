<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stock por Rack y Box - La Emilia</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --primary-color: #04847c;
      --accent-color: #355fb4;
      --bg-light: #f3f4f7;
      --bg-white: #ffffff;
      --text-color: #333;
      --border-radius: 12px;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-light);
      margin: 0;
      padding-top: 70px;
      color: var(--text-color);
    }

    .menu-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      background-color: var(--primary-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 30px;
      z-index: 1000;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .logo { height: 50px; filter: brightness(0) invert(1); }

    .button-group { display: flex; gap: 12px; }

    .button-group button {
      display: flex;
      align-items: center;
      gap: 8px;
      background-color: rgba(255,255,255,0.2);
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.4);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .button-group button:hover { background-color: white; color: var(--primary-color); }

    .container {
      background-color: var(--bg-white);
      max-width: 1100px;
      margin: 40px auto;
      padding: 35px;
      border-radius: var(--border-radius);
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    h1, h2 { text-align: center; color: var(--primary-color); }

    input[type="file"] {
      display: block;
      margin: 20px auto;
      padding: 10px;
      border: 2px dashed var(--primary-color);
      width: 80%;
      text-align: center;
      border-radius: 8px;
    }

    #dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin: 30px 0;
    }

    .dash-card {
      background: #eef1f8;
      border-left: 6px solid var(--primary-color);
      padding: 20px;
      border-radius: var(--border-radius);
      text-align: center;
    }

    .dash-card span {
      display: block;
      font-size: 1.6rem;
      font-weight: bold;
      color: var(--accent-color);
    }

    .search-container { display: flex; justify-content: flex-end; margin-bottom: 15px; }
    .search-container input {
      padding: 10px 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      width: 300px;
    }

    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th { background: var(--primary-color); color: white; padding: 12px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid #ddd; }
    tr:nth-child(even) { background-color: #f9f9fb; }

    @media print {
      .menu-bar, input, .search-container, #dashboard, canvas { display: none; }
      .container { box-shadow: none; margin: 0; padding: 0; width: 100%; }
    }
  </style>
</head>

<body>
  <div class="menu-bar">
    <div style="color:white; font-weight:bold; font-size:1.2rem;">SISTEMA DE STOCK</div>
    <div class="button-group">
      <button onclick="window.print()"><i class="fas fa-print"></i> Imprimir Reporte</button>
    </div>
  </div>

  <div class="container">
    <h1>Control de Stock por Estantería y Sector</h1>

    <input type="file" id="fileInput" accept=".xls,.xlsx" />

    <div id="dashboard">
      <div class="dash-card"><strong>Items:</strong><span id="totalItems">0</span></div>
      <div class="dash-card"><strong>Stock Total:</strong><span id="totalStock">0</span></div>
      <div class="dash-card"><strong>Estanterías:</strong><span id="totalRacks">0</span></div>
      <div class="dash-card"><strong>Sectores:</strong><span id="totalBoxes">0</span></div>
    </div>

    <canvas id="stockChart" height="100"></canvas>

    <h2>Inventario Consolidado</h2>
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Buscar por código, estantería..." oninput="buscarEnTabla()">
    </div>

    <table id="resultTable">
      <thead>
        <tr>
          <th>Código</th>
          <th>Descripción</th>
          <th>Estantería</th>
          <th>Sector</th>
          <th>Stock Real</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="5" style="text-align:center; padding:20px;">Cargue el archivo Excel para procesar los datos</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    let datosOriginales = [];
    let chart;

    document.getElementById('fileInput').addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(worksheet);
        procesarDatos(json);
      };
      reader.readAsArrayBuffer(file);
    });

    function procesarDatos(datosExcel) {
      const acumulado = {};
      
      datosExcel.forEach(fila => {
        const cod = (fila['Codigo'] || '').toString().trim();
        const desc = (fila['Descripción'] || '').toString().trim();
        const est = (fila['Estanteria'] || 'S/E').toString().trim();
        const sec = (fila['Sector'] || 'S/S').toString().trim();
        const ent = parseFloat(fila['Entrada de Stock']) || 0;
        const sal = parseFloat(fila['Salida de Stock']) || 0;

        if (!cod) return;

        // Clave única para agrupar por ubicación exacta
        const clave = `${cod}-${est}-${sec}`;

        if (!acumulado[clave]) {
          acumulado[clave] = {
            codigo: cod,
            descripcion: desc,
            estanteria: est,
            sector: sec,
            stock: 0
          };
        }
        acumulado[clave].stock += (ent - sal);
      });

      // Filtrar solo los que tienen stock mayor a 0
      datosOriginales = Object.values(acumulado).filter(i => i.stock > 0);
      renderizarTabla(datosOriginales);
    }

    function renderizarTabla(lista) {
      const tbody = document.querySelector('#resultTable tbody');
      tbody.innerHTML = '';
      
      let totalStock = 0;
      let racks = new Set();
      let boxes = new Set();
      const labels = [];
      const values = [];

      lista.forEach(item => {
        totalStock += item.stock;
        racks.add(item.estanteria);
        boxes.add(item.sector);
        labels.push(item.codigo);
        values.push(item.stock);

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${item.codigo}</td>
          <td>${item.descripcion}</td>
          <td>${item.estanteria}</td>
          <td>${item.sector}</td>
          <td style="font-weight:bold; color:var(--primary-color)">${item.stock}</td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById('totalItems').textContent = lista.length;
      document.getElementById('totalStock').textContent = totalStock;
      document.getElementById('totalRacks').textContent = racks.size;
      document.getElementById('totalBoxes').textContent = boxes.size;

      actualizarGrafico(labels, values);
    }

    function buscarEnTabla() {
      const termino = document.getElementById('searchInput').value.toLowerCase();
      const filtrados = datosOriginales.filter(item => 
        item.codigo.toLowerCase().includes(termino) || 
        item.descripcion.toLowerCase().includes(termino) ||
        item.estanteria.toLowerCase().includes(termino)
      );
      renderizarTabla(filtrados);
    }

    function actualizarGrafico(labels, data) {
      const ctx = document.getElementById('stockChart').getContext('2d');
      if (chart) chart.destroy();
      
      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels.slice(0, 15), // Mostrar solo los primeros 15 para no saturar
          datasets: [{
            label: 'Stock Actual (Top 15)',
            data: data.slice(0, 15),
            backgroundColor: '#04847c'
          }]
        },
        options: { responsive: true }
      });
    }
  </script>
</body>
</html>
